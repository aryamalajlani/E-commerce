<DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إنشاء حساب جديد</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4361ee;
      --primary-dark: #3f37c9;
      --danger: #e63946;
      --gray: #6b7280;
      --light: #f9fafb;
      --border: #d1d5db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Tajawal', system-ui, sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      direction: rtl;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      width: 100%;
      max-width: 480px;
    }

    .header {
      background: var(--primary);
      color: white;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .header p {
      opacity: 0.9;
      font-size: 1.05rem;
    }

    .form-content {
      padding: 2.5rem 2rem;
    }

    .form-group {
      margin-bottom: 1.6rem;
    }

    label {
      display: block;
      margin-bottom: 0.6rem;
      font-weight: 500;
      color: #374151;
      font-size: 1.05rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"] {
      width: 100%;
      padding: 0.9rem 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.05rem;
      transition: all 0.2s ease;
      background: #fafafa;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15);
      background: white;
    }

    .errorlist {
      color: var(--danger);
      font-size: 0.95rem;
      margin-top: 0.4rem;
      padding-right: 0.8rem;
      list-style: none;
    }

    .errorlist li::before {
      content: "• ";
      color: var(--danger);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.15rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 1.2rem;
    }

    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(67, 97, 238, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .login-link {
      text-align: center;
      margin-top: 1.8rem;
      color: var(--gray);
      font-size: 1.05rem;
    }

    .login-link a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .form-content {
        padding: 2rem 1.4rem;
      }
      .header {
        padding: 2rem 1.4rem;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>إنشاء حساب جديد</h2>
    <p>انضم إلينا الآن وابدأ تجربتك</p>
  </div>

  <div class="form-content">
    <form method="post" novalidate>
      {% csrf_token %}

      {% if form.non_field_errors %}
        <div class="errorlist" style="margin-bottom: 1.5rem; color: var(--danger);">
          {% for error in form.non_field_errors %}
            <p>{{ error }}</p>
          {% endfor %}
        </div>
      {% endif %}

      {% for field in form %}
        <div class="form-group">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          
          {{ field }}
          
        
        
        </div>
      {% endfor %}

      <button type="submit" class="btn">تسجيل دخول </button>
    </form>

    <div class="login-link">
     ليس لديك حساب<a href="{% url 'register' %}"> إنشاء الحساب</a>
    </div>
  </div>
</div>

</body>
</html>
